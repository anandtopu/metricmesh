{{- if .Values.flower.enabled }}
{{- $component := "flower" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      {{- with .Values.image.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-redis 6379; do sleep 2; done"]
      containers:
        - name: flower
          image: {{ include "metricmesh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - workers.celery_app:celery_app
            - flower
            - --port={{ .Values.flower.port }}
          ports:
            - name: http
              containerPort: {{ .Values.flower.port }}
          envFrom: {{- include "metricmesh.envFrom" . | nindent 12 }}
          livenessProbe:
            httpGet: {path: /healthcheck, port: http}
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthcheck, port: http}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{- toYaml .Values.flower.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.flower.port }}
      targetPort: http
{{- end }}
