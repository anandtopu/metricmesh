{{- if .Values.redis.enabled }}
{{- $component := "redis" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec: {command: ["redis-cli", "ping"]}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end }}
