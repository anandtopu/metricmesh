{{/*
Externalized secrets (MM-9.4/MM-11.5). For production, replace this with a
Secret managed by external-secrets / sealed-secrets and set
secrets.* / timescaledb.password to placeholders.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
type: Opaque
stringData:
  # DB URLs carry credentials, so they live in the Secret, not the ConfigMap.
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s-timescaledb:5432/%s" .Values.timescaledb.user .Values.timescaledb.password .Release.Name .Values.timescaledb.database | quote }}
  DATABASE_URL_SYNC: {{ printf "postgresql+psycopg2://%s:%s@%s-timescaledb:5432/%s" .Values.timescaledb.user .Values.timescaledb.password .Release.Name .Values.timescaledb.database | quote }}
  POSTGRES_PASSWORD: {{ .Values.timescaledb.password | quote }}
  API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  TENANT_API_KEYS: {{ .Values.secrets.tenantApiKeys | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  PAGERDUTY_ROUTING_KEY: {{ .Values.secrets.pagerdutyRoutingKey | quote }}
  TEAMS_WEBHOOK_URL: {{ .Values.secrets.teamsWebhookUrl | quote }}
