{{- range $w := .Values.workers }}
{{- $component := printf "worker-%s" $w.name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" $ "component" $component) }}
  labels: {{- include "metricmesh.labels" $ | nindent 4 }}
spec:
  replicas: {{ $w.replicas }}
  selector:
    matchLabels: {{- include "metricmesh.selectorLabels" (dict "root" $ "component" $component) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "metricmesh.selectorLabels" (dict "root" $ "component" $component) | nindent 8 }}
    spec:
      {{- with $.Values.image.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ $.Release.Name }}-redis 6379; do sleep 2; done"]
      containers:
        - name: worker
          image: {{ include "metricmesh.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - workers.celery_app:celery_app
            - worker
            - -Q
            - {{ $w.queue | quote }}
            - -c
            - {{ $w.concurrency | quote }}
            - --loglevel=info
          envFrom: {{- include "metricmesh.envFrom" $ | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A workers.celery_app:celery_app inspect ping -d celery@$(hostname) -t 10
            initialDelaySeconds: 40
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3
          resources: {{- toYaml $w.resources | nindent 12 }}
{{- if $w.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" $ "component" $component) }}
  labels: {{- include "metricmesh.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "metricmesh.fullname" (dict "root" $ "component" $component) }}
  minReplicas: {{ $w.hpa.minReplicas }}
  maxReplicas: {{ $w.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $w.hpa.targetCPUUtilizationPercentage }}
{{- end }}
---
{{- end }}
