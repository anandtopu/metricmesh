{{- $component := "api" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
      {{- if .Values.api.metricsScrape }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.api.port | quote }}
        prometheus.io/path: /metrics
      {{- end }}
    spec:
      {{- with .Values.image.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - >-
              until nc -z {{ .Release.Name }}-timescaledb 5432; do echo waiting-db; sleep 2; done;
              until nc -z {{ .Release.Name }}-redis 6379; do echo waiting-redis; sleep 2; done
      containers:
        - name: api
          image: {{ include "metricmesh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", {{ .Values.api.port | quote }}]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom: {{- include "metricmesh.envFrom" . | nindent 12 }}
          env:
            # Per-pod multiprocess dir so prometheus_client aggregates this pod's
            # processes. NOTE: unlike docker-compose's shared host volume, pods do
            # not share a filesystem, so cross-pod worker metrics are NOT merged
            # here — Prometheus scrapes each pod's /metrics (see chart README).
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prommp
          volumeMounts:
            - name: prommp
              mountPath: /tmp/prommp
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            # /readiness checks both TimescaleDB and Redis (MM-8.2) → 503 when degraded.
            httpGet: {path: /readiness, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: prommp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "metricmesh.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: http
{{- if .Values.api.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  labels: {{- include "metricmesh.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "metricmesh.fullname" (dict "root" . "component" $component) }}
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetCPUUtilizationPercentage }}
{{- end }}
