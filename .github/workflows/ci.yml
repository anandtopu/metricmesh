name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # ── Blocking gates ────────────────────────────────────────────────────
      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        # The test suite is fully mocked (no DB/Redis needed) — verified by
        # running it against unreachable hosts.
        run: pytest

      # ── Blocking gate (MM-11.6: backlog cleared, strict mypy is clean) ─────
      - name: Mypy type-check
        # mypy strict (config in pyproject.toml) over the shipping code (tests
        # excluded). Now a hard gate — a type error fails the build.
        run: mypy . --ignore-missing-imports
